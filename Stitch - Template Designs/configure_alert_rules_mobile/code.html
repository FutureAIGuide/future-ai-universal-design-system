<body class="bg-fg-canvas font-body-lg text-fg-text-1">
<!-- TopAppBar Component -->
<header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-xl border-b border-fg-border flex justify-between items-center px-6 h-16 shadow-orange/10">
<div class="flex items-center gap-3">

<h1 class="font-headline-md text-headline-md font-bold tracking-tight text-primary">INTEL_CORE_v1.0</h1>
</div>
<div class="w-8 h-8 rounded-full bg-fg-surface-md border border-fg-border flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="A futuristic circular avatar of an intelligence officer profile, high-contrast black and white photography with subtle orange glitch effects, ultra-sharp detail, cinematic lighting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBuVZSNJa6XT2JPqaqyxbgdlnS66kQHKSgzKl4V9czmNQtpdO7_jzGyRjrRpsiFW7-keS7IVcEAn6bA2GDhiv3S76rueZG6CwzGmKOTpeSgdpoHR1uN6oVoZOKboU_GkmpnFhn-6JbFKpFwUOq62xV0pyW3VWasR5_D1f9tBfmJrKpKjCxN2dF3FJfuUsFJnNOICiwEROVCctLzJFn45oDbLZViBawUDTh8wldlRl_nzahCoeZvSKZRbLnLQodeUdMVWVHj5drLmtE"/>
</div>
</header>
<main class="pt-24 pb-32 px-4 max-w-md mx-auto">
<!-- Title & Metadata -->
<div class="mb-12">
<div class="flex items-center justify-between mb-2">
<span class="font-section-label text-section-label uppercase tracking-[0.2em] text-primary-container">System Config</span>
<span class="font-mono-data text-[10px] text-fg-text-3">PROTOCOL: v4.2</span>
</div>
<h2 class="font-display-lg-mobile text-display-lg-mobile mb-2">Configure Alert Rule</h2>
<div class="flex gap-4">
<span class="font-mono-data text-[10px] text-fg-text-3">ENCRYPTION: AES-256</span>
<span class="font-mono-data text-[10px] text-fg-text-3">AUTH: LEVEL-4</span>
</div>
</div>
<!-- Step 1: Event Triggers -->
<section class="mb-8 relative pt-4">
<div class="absolute top-0 left-0 w-full h-[2px] bg-primary-container shadow-[0_0_8px_rgba(255,95,31,0.5)]"></div>
<label class="font-section-label text-section-label uppercase mb-4 block text-fg-text-2">STEP 01 // EVENT TRIGGERS</label>
<div class="space-y-2">
<!-- Trigger Item -->
<button class="w-full glass-panel flex items-center p-4 gap-4 transition-all duration-200 active:scale-[0.98] hover:bg-fg-surface-md group" onclick="toggleSelect(this)">
<span class="material-symbols-outlined text-fg-text-3 group-hover:text-primary" data-icon="manage_search">manage_search</span>
<span class="font-body-sm text-left flex-1">Investigation Completed</span>
<div class="w-2 h-2 rounded-full border border-fg-border selection-dot"></div>
</button>
<button class="w-full glass-panel flex items-center p-4 gap-4 transition-all duration-200 active:scale-[0.98] hover:bg-fg-surface-md group" onclick="toggleSelect(this)">
<span class="material-symbols-outlined text-fg-text-3 group-hover:text-primary" data-icon="memory">memory</span>
<span class="font-body-sm text-left flex-1">High Resource Usage</span>
<div class="w-2 h-2 rounded-full border border-fg-border selection-dot"></div>
</button>
<button class="w-full glass-panel flex items-center p-4 gap-4 transition-all duration-200 active:scale-[0.98] hover:bg-fg-surface-md group border-primary-container/40" onclick="toggleSelect(this)">
<span class="material-symbols-outlined text-primary" data-icon="lock_open">lock_open</span>
<span class="font-body-sm text-left flex-1">Unauthorized Access Detected</span>
<div class="w-2 h-2 rounded-full bg-primary-container selection-dot shadow-[0_0_4px_rgba(255,95,31,0.8)]"></div>
</button>
<button class="w-full glass-panel flex items-center p-4 gap-4 transition-all duration-200 active:scale-[0.98] hover:bg-fg-surface-md group" onclick="toggleSelect(this)">
<span class="material-symbols-outlined text-fg-text-3 group-hover:text-primary" data-icon="sync_problem">sync_problem</span>
<span class="font-body-sm text-left flex-1">Node Sync Failure</span>
<div class="w-2 h-2 rounded-full border border-fg-border selection-dot"></div>
</button>
</div>
</section>
<!-- Step 2: Severity Levels -->
<section class="mb-8 relative pt-4">
<div class="absolute top-0 left-0 w-full h-[2px] bg-secondary-container shadow-[0_0_8px_rgba(131,198,0,0.5)]"></div>
<label class="font-section-label text-section-label uppercase mb-4 block text-fg-text-2">STEP 02 // SEVERITY LEVEL</label>
<div class="grid grid-cols-3 gap-2">
<button class="glass-panel py-3 font-section-label text-section-label transition-colors hover:bg-fg-surface-md border-fg-border">LOW</button>
<button class="glass-panel py-3 font-section-label text-section-label text-fg-amber border-fg-amber/30 bg-fg-amber/5">MEDIUM</button>
<button class="glass-panel py-3 font-section-label text-section-label transition-colors hover:bg-fg-surface-md">HIGH</button>
</div>
</section>
<!-- Step 3: Notification Channels -->
<section class="mb-12 relative pt-4">
<div class="absolute top-0 left-0 w-full h-[2px] bg-fg-rust shadow-[0_0_8px_rgba(255,68,68,0.5)]"></div>
<label class="font-section-label text-section-label uppercase mb-4 block text-fg-text-2">STEP 03 // NOTIFICATION CHANNELS</label>
<div class="space-y-4">
<div class="flex items-center justify-between p-2">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-fg-text-3" data-icon="alternate_email">alternate_email</span>
<span class="font-body-sm">Email Transmission</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-10 h-5 bg-fg-surface-md border border-fg-border peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary-container"></div>
</label>
</div>
<div class="flex items-center justify-between p-2">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-fg-text-3" data-icon="notifications_active">notifications_active</span>
<span class="font-body-sm">Push Protocol</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox"/>
<div class="w-10 h-5 bg-fg-surface-md border border-fg-border peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary-container"></div>
</label>
</div>
<div class="flex items-center justify-between p-2">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-fg-text-3" data-icon="sms_failed">sms_failed</span>
<span class="font-body-sm">Encrypted SMS</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox"/>
<div class="w-10 h-5 bg-fg-surface-md border border-fg-border peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary-container"></div>
</label>
</div>
</div>
</section>
<!-- Initialize Rule Button -->
<button class="w-full bg-primary-container text-fg-canvas font-section-label py-5 flex items-center justify-center gap-3 shadow-[0_4px_20px_rgba(255,95,31,0.4)] hover:opacity-90 active:scale-[0.98] transition-all">
            INITIALIZE_RULE
            <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>

<nav class="fixed bottom-0 w-full z-50 bg-background/90 backdrop-blur-2xl border-t border-fg-border flex justify-around items-center h-20 pb-4 px-4 shadow-orange/20">

<span class="material-symbols-outlined" data-icon="database">database</span>
<span class="font-section-label text-section-label uppercase">INTEL</span>
</a>
<a class="flex flex-col items-center justify-center text-primary-container font-bold gap-1 hover:text-primary-fixed transition-all active:scale-95 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="notifications_active" style="font-variation-settings: 'FILL' 1;">notifications_active</span>
<span class="font-section-label text-section-label uppercase">ALERTS</span>
</a>
<a class="flex flex-col items-center justify-center text-fg-text-3 gap-1 hover:text-primary-fixed transition-all active:scale-95 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="monitoring">monitoring</span>
<span class="font-section-label text-section-label uppercase">MONITOR</span>
</a>
<a class="flex flex-col items-center justify-center text-fg-text-3 gap-1 hover:text-primary-fixed transition-all active:scale-95 duration-150" href="#">
<span class="material-symbols-outlined" data-icon="security">security</span>
<span class="font-section-label text-section-label uppercase">SECURE</span>
</a>
</nav>
<script>
        function toggleSelect(el) {
            const dot = el.querySelector('.selection-dot');
            const icon = el.querySelector('.material-symbols-outlined');
            
            if (dot.classList.contains('bg-primary-container')) {
                dot.classList.remove('bg-primary-container', 'shadow-[0_0_4px_rgba(255,95,31,0.8)]');
                dot.classList.add('border', 'border-fg-border');
                el.classList.remove('border-primary-container/40');
                icon.classList.remove('text-primary');
                icon.classList.add('text-fg-text-3');
            } else {
                dot.classList.add('bg-primary-container', 'shadow-[0_0_4px_rgba(255,95,31,0.8)]');
                dot.classList.remove('border', 'border-fg-border');
                el.classList.add('border-primary-container/40');
                icon.classList.add('text-primary');
                icon.classList.remove('text-fg-text-3');
            }
        }
    </script>
